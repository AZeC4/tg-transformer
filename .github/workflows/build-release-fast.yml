name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # 支持手动触发

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false  # 某个平台失败不影响其他平台继续构建
      matrix:
        include:
          - os: windows-latest
            platform: windows
            ext: .exe
          - os: macos-latest
            platform: macos
            ext: ""
          - os: ubuntu-latest
            platform: linux
            ext: ""

    runs-on: ${{ matrix.os }}
    timeout-minutes: 20

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    # Linux 需要安装 tkinter 和显示相关的系统依赖
    - name: Install system dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y python3-tk libxcb-xinerama0 libxkbcommon-x11-0 libxcb-cursor0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install -r requirements-build.txt -r requirements.txt
      env:
        PIP_DEFAULT_TIMEOUT: 120
        PIP_RETRIES: 5

    - name: Build executable
      run: python build.py
      env:
        DISPLAY: ${{ runner.os == 'Linux' && ':99' || '' }}

    # 列出构建产物（调试用）
    - name: List build output
      shell: bash
      run: ls -la dist/

    # Windows 用 PowerShell 重命名（避免 bash 中文编码问题）
    - name: Rename artifact (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $src = "dist/TG-Converter${{ matrix.ext }}"
        $dst = "dist/TG-Converter-${{ matrix.platform }}${{ matrix.ext }}"
        if (Test-Path $src) {
          Copy-Item $src $dst
          Write-Output "✅ Build artifact found and renamed"
        } else {
          Write-Output "❌ Build artifact NOT found"
          Get-ChildItem dist/
          exit 1
        }

    # macOS / Linux 用 bash 重命名
    - name: Rename artifact (Unix)
      if: runner.os != 'Windows'
      shell: bash
      run: |
        src="dist/TG-Converter${{ matrix.ext }}"
        dst="dist/TG-Converter-${{ matrix.platform }}${{ matrix.ext }}"
        if [ -f "$src" ]; then
          cp "$src" "$dst"
          echo "✅ Build artifact found and renamed"
        else
          echo "❌ Build artifact NOT found, listing dist:"
          ls -la dist/
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: TG-Converter-${{ matrix.platform }}
        path: dist/TG-Converter-${{ matrix.platform }}${{ matrix.ext }}
        retention-days: 5

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: true

    - name: List release files
      run: ls -laR artifacts/

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: artifacts/*
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
