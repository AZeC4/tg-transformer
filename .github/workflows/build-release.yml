name: Build and Release

on:
  push:
    tags:
      - 'v*'  # 当推送 v 开头的标签时触发，如 v1.0.0

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: TG账号格式转换
            asset_name: TG账号格式转换-linux
          - os: windows-latest
            artifact_name: TG账号格式转换.exe
            asset_name: TG账号格式转换-windows.exe
          - os: macos-latest
            artifact_name: TG账号格式转换.app
            asset_name: TG账号格式转换-macos.app

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'  # 使用稳定版本

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-build.txt

    - name: Install project dependencies
      run: pip install -r requirements.txt

    - name: Build with PyInstaller
      run: python build.py

    - name: Prepare artifacts (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        ls -la dist/

    - name: Prepare artifacts (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: |
        dir dist\

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/${{ matrix.artifact_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # 可选：上传构建日志
    - name: Upload build artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: build-logs-${{ matrix.os }}
        path: build/
        retention-days: 5
